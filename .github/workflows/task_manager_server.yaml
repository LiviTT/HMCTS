name: Task Manager Server

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/task_manager_server.yaml"
      - "server/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/task_manager_server.yaml"
      - "server/**"

env:
  SERVER_WORKING_DIRECTORY: pkg/data-room/server
  APP_NAME: "data-room"

jobs:
  lint-test:
    uses: ./.github/workflows/_go-lint-test.yaml
    needs: [job-vars]
    with:
      name: "server"
      working-directory: "."
      go-version: "1.25"
